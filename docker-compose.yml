services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moppa}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./install/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-moppa}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: moppa-backend:latest
    build:
      context: ./moppa_backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./moppa_backend/.env.example
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-db,backend,localhost,127.0.0.1,::1}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-db,backend,localhost,127.0.0.1,::1}
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "1"
      net.ipv6.conf.default.disable_ipv6: "1"
      net.ipv6.conf.lo.disable_ipv6: "1"
    volumes:
      - ./moppa_backend/logs:/app/logs
    ports:
      - "${BACKEND_PUBLIC_PORT:-8000}:8000"

  frontend:
    image: moppa-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_BASEMAP_URL: http://192.168.1.200:9000/offline-map/global_2025_12_18_map/bing_aerial/{z}/{x}/{y}.jpeg
    depends_on:
      - backend
    ports:
      - "${MOPPA_PUBLIC_PORT:-18081}:80"

volumes:
  postgres_data:
